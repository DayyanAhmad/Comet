<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Comet</title>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/window.css" />
  <link rel="stylesheet" href="styles/header.css" />
  <link rel="stylesheet" href="styles/info.css" />
  <link rel="stylesheet" href="styles/tabs.css" />
  <link rel="stylesheet" href="styles/steps.css" />
  <link rel="stylesheet" href="styles/progress.css" />
  <link rel="stylesheet" href="styles/buttons.css" />
  <link rel="stylesheet" href="styles/logs.css" />
  <link rel="stylesheet" href="styles/badges.css" />
  <link rel="stylesheet" href="styles/stars.css" />
</head>
<body>

  <div class="window">

    <!-- Titlebar -->
    <div class="titlebar">
      <div class="titlebar__controls">
        <div class="titlebar__dot titlebar__dot--close" id="close-dot"></div>
        <div class="titlebar__dot titlebar__dot--min"></div>
        <div class="titlebar__dot titlebar__dot--max"></div>
      </div>
      <span class="titlebar__title">Comet</span>
      <div class="titlebar__spacer"></div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header__icon">
        <img src="../assets/icon.png" alt="Comet" />
      </div>
      <div class="header__text">
        <div class="header__name">Comet</div>
        <div class="header__subtitle">Keep Discord up to date</div>
      </div>
    </div>

    <!-- Version info rows -->
    <div class="info-section">
      <div class="info-row">
        <span class="info-row__label">Installed</span>
        <span class="info-row__value info-row__value--empty" id="installed-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-row__label">Latest</span>
        <span class="info-row__value info-row__value--empty" id="latest-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-row__label">Status</span>
        <span class="badge badge--neutral" id="status-badge">Not checked</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tabs">
      <button class="tab tab--active" id="tab-update">Update</button>
      <button class="tab" id="tab-logs">Logs</button>
    </div>

    <!-- Steps panel (update tab) -->
    <div class="steps" id="steps-panel">
      <div class="step" id="step-1">
        <div class="step__dot" id="dot-1">1</div>
        <span class="step__label">Check installed version</span>
      </div>
      <div class="step" id="step-2">
        <div class="step__dot" id="dot-2">2</div>
        <span class="step__label">Download Discord</span>
      </div>
      <div class="step" id="step-3">
        <div class="step__dot" id="dot-3">3</div>
        <span class="step__label">Install Discord</span>
      </div>
      <div class="step" id="step-4">
        <div class="step__dot" id="dot-4">4</div>
        <span class="step__label">Launch Discord</span>
      </div>
    </div>

    <!-- Logs panel (logs tab) -->
    <div class="logs-panel" id="logs-panel">
      <div class="logs-panel__toolbar">
        <button class="btn btn--ghost" id="btn-open-log">Open log file</button>
      </div>
      <div class="logs-panel__output" id="logs-output"></div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-meta">
        <span class="progress-meta__label" id="progress-label">Downloading…</span>
        <span class="progress-meta__pct" id="progress-pct"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Footer buttons -->
    <div class="footer">
      <button class="btn btn--ghost" id="btn-check">Check for updates</button>
      <button class="btn btn--primary" id="btn-update" disabled>Update Discord</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
