appId: com.comet.app
productName: comet
directories:
  output: dist

extraFiles:
  - from: scripts/
    to: scripts/
  - from: com.comet.install.policy
    to: com.comet.install.policy

linux:
  target: deb
  category: Utility
  icon: assets/icon.png
  executableName: comet
  description: A one-click Discord updater for Ubuntu

deb:
  afterInstall: scripts/postinstall.sh
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - curl
    - policykit-1
